<svg width="580" height="160" viewBox="0 0 580 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1B3A5C"/>
      <stop offset="100%" stop-color="#0E7C9E"/>
    </linearGradient>
  </defs>

  <!-- Icon: circular mark with a play-triangle formed by a "C" -->
  <g transform="translate(2, 2)">
    <circle cx="78" cy="78" r="76" fill="url(#markGradient)"/>
    <!-- Stylized C ring -->
    <path d="M 128 44 A 56 56 0 1 0 128 112" fill="none" stroke="#FFFFFF" stroke-width="14" stroke-linecap="round"/>
    <!-- Play triangle nestled in the C opening -->
    <path d="M 94 57 L 128 78 L 94 99 Z" fill="#FFFFFF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(175, 0)">
    <text x="0" y="92" font-family="'Outfit', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="62" font-weight="800" letter-spacing="-1.5" fill="#1B3A5C">Channel<tspan fill="#0E7C9E">mate</tspan></text>
    <text x="2" y="128" font-family="'Outfit', 'Inter', 'Segoe UI', system-ui, sans-serif" font-size="19" font-weight="800" letter-spacing="4.5" fill="#5A6E85">YOUTUBE AUTOMATION</text>
  </g>
</svg>
