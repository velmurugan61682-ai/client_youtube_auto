<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Modern Red to Blue Gradient -->
    <linearGradient id="tvGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="100%" stop-color="#0055ff" />
    </linearGradient>
    <!-- Circuit Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ambient outer circle -->
  <circle cx="256" cy="256" r="230" fill="none" stroke="url(#tvGradient)" stroke-width="4" opacity="0.15" />

  <!-- Monogram 'TVCA' in futuristic circuit vector lines -->
  <g filter="url(#glow)">
    <!-- Letter 'T' (Top horizontal bar and vertical stem) -->
    <path d="M 130 170 L 330 170 M 230 170 L 230 350" stroke="url(#tvGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Letter 'V' (Diagonal down and up, intersecting or adjacent to T) -->
    <path d="M 230 350 L 290 410 L 390 230" stroke="url(#tvGradient)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- Letter 'C' / Digital track enclosing the monogram -->
    <path d="M 410 130 L 90 130 L 90 390 L 190 390" stroke="url(#tvGradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6" stroke-dasharray="20, 10" />

    <!-- Circuit node dots -->
    <circle cx="130" cy="170" r="16" fill="#ff0055" />
    <circle cx="330" cy="170" r="16" fill="#0055ff" />
    <circle cx="390" cy="230" r="16" fill="#0055ff" />
    <circle cx="290" cy="410" r="16" fill="#ff0055" />

    <!-- Circuit tracks (lines extending with node dots) -->
    <path d="M 130 170 L 170 130 M 330 170 L 290 210 M 230 270 L 170 270" stroke="url(#tvGradient)" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.8" />
    <circle cx="170" cy="130" r="8" fill="#ff0055" />
    <circle cx="290" cy="210" r="8" fill="#0055ff" />
    <circle cx="170" cy="270" r="8" fill="url(#tvGradient)" />
  </g>
</svg>
